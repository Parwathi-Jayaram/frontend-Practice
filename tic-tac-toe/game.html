<html>
    <head>
        <style>
            main{
                margin: 0;
                padding: 0;
            }
            body{
                background-color:black;
                text-align: center;
                color:rgb(246, 16, 93)
            }
            h1{
                padding-top: 2cm;
                font-size: 60px;
            }
            .container{
                background-color:rgba(0, 0, 0, 0);
                height:auto;
                display:flex;
                justify-content: center;
            align-items: center;
            }
            .game{
                justify-content: center;
                width:15cm;
                height:15cm;
                display:flex;
                flex-wrap: wrap;
                gap: 1.5vmin;
            }
            .button{
                height: 4cm;
                width: 4cm;
                background-color: rgba(210, 188, 231, 0.832);
                border-radius: 1rem;
                color:rgb(138, 43, 226);
            }
            .button:hover{
                border-color:rgb(138, 43, 226);
            }
            .re{
                background-color: yellow;
                color:black;
                font-size:30px;
                border-color: black;
                border-radius: 1rem;
                height:1.5cm;
            }
        </style>
    </head>
    <body>
    <main>
        <h1>Tic Tac Toe</h1>
        <div class="container">
            <div class="game">
                <button class="button"></button>
                <button class="button"></button>
                <button class="button"></button>
                <button class="button"></button>
                <button class="button"></button>
                <button class="button"></button>
                <button class="button"></button>
                <button class="button"></button>
                <button class="button"></button>
            </div>
        </div>
    </main>
    <button class="re">Reset Game</button>
    </body>
</html>
