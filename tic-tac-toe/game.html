<html>

<head>
    <style>
        main {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: black;
            text-align: center;
            color: rgb(246, 16, 93);
        }

        h1 {
            padding-top: 2cm;
            font-size: 60px;
        }

        .container {
            background-color: rgba(0, 0, 0, 0);
            height: auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game {
            justify-content: center;
            width: 15cm;
            height: 15cm;
            display: flex;
            flex-wrap: wrap;
            gap: 1.5vmin;
        }

        .box {
            height: 4cm;
            width: 4cm;
            background-color: rgba(210, 188, 231, 0.832);
            border-radius: 1rem;
            color: rgb(138, 43, 226);
            font-size: 30px;
        }

        .box:hover {
            border-color: rgb(138, 43, 226);
        }

        #reset {
            background-color: yellow;
            color: black;
            font-size: 30px;
            border-color: black;
            border-radius: 1rem;
            height: 1.5cm;
        }

        .hide {
            display: none;
        }

        .msg-container {
            color: rgb(246, 16, 93);
            font-size: 50px;
        }

        #new-btn {
            background-color: yellow;
            color: black;
            font-size: 30px;
            border-color: black;
            border-radius: 1rem;
            height: 1.5cm;
        }
    </style>
</head>

<body>
    <div class="msg-container hide">
        <p id="msg">Winner</p>
        <button id="new-btn">New Game</button>
    </div>
    <main>
        <h1>Tic Tac Toe</h1>
        <div class="container">
            <div class="game">
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
            </div>
        </div>
    </main>
    <button id="reset">Reset Game</button>
</body>
<script>
    let boxes = [...document.querySelectorAll('.box')];
    let resetBtn = document.querySelector('#reset');
    let turnO = true; // Player O starts
    let newGameBtn = document.querySelector('#new-btn');
    let msgContainer = document.querySelector('.msg-container');
    let msg = document.querySelector('#msg');

    const winPatterns = [
        [0, 1, 2],
        [0, 3, 6],
        [0, 4, 8],
        [1, 4, 7],
        [2, 5, 8],
        [2, 4, 6],
        [3, 4, 5],
        [6, 7, 8]
    ];

    boxes.forEach((box) => {
        box.addEventListener('click', function () {
            if (turnO) {
                box.innerText = 'O';
                box.style.color = 'green';
                turnO = false;
                box.disabled = true;
                checkWinner();
            } else {
                box.innerText = 'X';
                box.style.color = 'red';
                turnO = true;
                box.disabled = true;
                checkWinner();
            }
        });
    });

    const enableBoxes = () => {
        for (let box of boxes) {
            box.disabled = false;
            box.innerText = "";
        }
    };

    const disableBoxes = () => {
        for (let box of boxes) {
            box.disabled = true;
        }
    };

    const showWinner = (winner) => {
        msg.innerText = `Congratulations, Winner is ${winner}`;
        msgContainer.classList.remove('hide');
        document.querySelector('.container').classList.add('hide');
        disableBoxes();
    };

    const checkWinner = () => {
        let hasWin = false;
        for (let pattern of winPatterns) {
            let pos1Val = boxes[pattern[0]].innerText;
            let pos2Val = boxes[pattern[1]].innerText;
            let pos3Val = boxes[pattern[2]].innerText;

            if (pos1Val !== "" && pos2Val !== "" && pos3Val !== ""
                && pos1Val === pos2Val && pos2Val === pos3Val) {
                showWinner(pos1Val);
                document.remove('container')
                hasWin = true;
                return;
            }
        }

        if (!hasWin) {
            const allBoxes = [...boxes].every((box) => box.innerText !== "");
            if (allBoxes) {
                msgContainer.classList.remove('hide');
                msg.innerText = 'Match Drawn';
            }
        }
    };

    const resetGame = () => {
        turnO = true;
        enableBoxes();
        msgContainer.classList.add('hide'); // hide winner message
        document.querySelector('.container').classList.remove('hide'); // show board again
    };

    newGameBtn.addEventListener('click', resetGame);
    resetBtn.addEventListener('click', resetGame);
</script>

</html>
